version: '3.8'

services:
  # ===========================================
  # RAG Chatbot API
  # ===========================================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: rag-chatbot-api
    ports:
      - "8000:8000"
      - "9090:9090"  # Prometheus metrics
    environment:
      - APP_ENVIRONMENT=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LLM_PROVIDER=vllm
      - VLLM_BASE_URL=http://vllm:8000/v1
      - VLLM_MODEL_NAME=microsoft/Phi-3-mini-4k-instruct
      - FALLBACK_ENABLED=true
      - FALLBACK_TO_OPENAI=true
      - VECTOR_DB_TYPE=chroma
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - USE_CACHE=true
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - METRICS_ENABLED=true
    volumes:
      - rag-data:/app/data
      - rag-logs:/app/logs
    depends_on:
      vllm:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # vLLM Inference Server (Primary LLM)
  # ===========================================
  vllm:
    image: vllm/vllm-openai:latest
    container_name: rag-vllm
    ports:
      - "8001:8000"  # OpenAI-compatible API
    environment:
      - VLLM_API_KEY=not-needed
    volumes:
      - vllm-cache:/root/.cache/huggingface
    command: >
      --model microsoft/Phi-3-mini-4k-instruct
      --trust-remote-code
      --dtype auto
      --max-model-len 4096
      --gpu-memory-utilization 0.9
      --enforce-eager
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 300s  # vLLM needs time to load model

  # ===========================================
  # vLLM CPU-only (Alternative for no GPU)
  # ===========================================
  vllm-cpu:
    image: vllm/vllm-cpu:latest
    container_name: rag-vllm-cpu
    ports:
      - "8001:8000"
    volumes:
      - vllm-cache:/root/.cache/huggingface
    command: >
      --model microsoft/Phi-3-mini-4k-instruct
      --trust-remote-code
      --dtype float32
      --max-model-len 2048
    networks:
      - rag-network
    restart: unless-stopped
    profiles:
      - cpu  # Only start with: docker-compose --profile cpu up

  # ===========================================
  # Redis for Caching
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================
  # Qdrant Vector Database (Alternative)
  # ===========================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - rag-network
    restart: unless-stopped
    profiles:
      - qdrant

  # ===========================================
  # Prometheus (Metrics Collection)
  # ===========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: rag-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - rag-network
    restart: unless-stopped
    profiles:
      - monitoring

  # ===========================================
  # Grafana (Metrics Visualization)
  # ===========================================
  grafana:
    image: grafana/grafana:latest
    container_name: rag-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - rag-network
    restart: unless-stopped
    profiles:
      - monitoring

networks:
  rag-network:
    driver: bridge

volumes:
  rag-data:
  rag-logs:
  redis-data:
  qdrant-data:
  vllm-cache:
  prometheus-data:
  grafana-data:
