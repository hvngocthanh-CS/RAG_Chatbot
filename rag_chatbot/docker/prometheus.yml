# Prometheus configuration for RAG Chatbot
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # RAG Chatbot API metrics
  - job_name: 'rag-chatbot-api'
    static_configs:
      - targets: ['api:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # vLLM metrics (if exposed)
  - job_name: 'vllm'
    static_configs:
      - targets: ['vllm:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Redis metrics (requires redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
